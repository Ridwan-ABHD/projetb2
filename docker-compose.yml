services:

  # =====================================================
  # Broker MQTT — Gestion des messages des capteurs
  # =====================================================
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - apicole-net

  # =====================================================
  # Backend Python FastAPI
  # =====================================================
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - HMAC_SECRET=${HMAC_SECRET:-dev_secret}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_EMAIL=${VAPID_EMAIL:-mailto:admin@surveillance-apicole.fr}
      - DB_PATH=/app/db/RucheIA.db
    depends_on:
      - mosquitto
    volumes:
      - db-data:/app/db
    networks:
      - apicole-net

  # =====================================================
  # Simulateur de capteurs IoT (direct SQLite, sans MQTT)
  # =====================================================
  sensor-mock:
    image: python:3.12-slim
    command: >
      sh -c "pip install pandas -q && python /bdd/moks_live.py"
    environment:
      - DB_PATH=/db/RucheIA.db
      - CSV_TEMP=/bdd/temperature_2017.csv
      - CSV_POIDS=/bdd/weight_2017.csv
      - MOCK_INTERVAL=5
    depends_on:
      - backend
    volumes:
      - ./BDD:/bdd
      - db-data:/db
    networks:
      - apicole-net

  # =====================================================
  # Frontend Angular (build multi-étapes + Nginx)
  # =====================================================
  frontend:
    build: ./angular-app
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - apicole-net

volumes:
  db-data:

networks:
  apicole-net:
    driver: bridge
