services:

  # =====================================================
  # Broker MQTT — Gestion des messages des capteurs
  # =====================================================
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - apicole-net

  # =====================================================
  # Backend Python FastAPI
  # =====================================================
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
      - HMAC_SECRET=${HMAC_SECRET:-dev_secret}
      - DATABASE_URL=sqlite:///./apicole.db
    depends_on:
      - mosquitto
    volumes:
      - ./backend:/app
    networks:
      - apicole-net

  # =====================================================
  # Frontend Angular (build multi-étapes + Nginx)
  # Remplace l'ancien service nginx:alpine avec fichiers statiques
  # =====================================================
  frontend:
    build: ./angular-app   # Build l'image depuis angular-app/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - apicole-net

networks:
  apicole-net:
    driver: bridge
