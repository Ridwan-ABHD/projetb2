server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # =====================================================
    # Proxy vers le backend Python (FastAPI)
    # Le navigateur appelle /hives/ → Nginx redirige vers http://backend:8000/hives/
    # "backend" = nom du service dans docker-compose.yml
    # =====================================================
    location /hives/ {
        proxy_pass http://backend:8000/hives/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /alerts/ {
        proxy_pass http://backend:8000/alerts/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /diagnose/ {
        proxy_pass http://backend:8000/diagnose/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /settings/ {
        proxy_pass http://backend:8000/settings/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /chat/ {
        proxy_pass http://backend:8000/chat/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }

    # =====================================================
    # Routing SPA Angular
    # Toute URL non trouvée → retourne index.html
    # Permet à Angular Router de gérer /dashboard, /map, etc.
    # IMPORTANT : cette règle doit être en DERNIER
    # =====================================================
    location / {
        try_files $uri $uri/ /index.html;
    }
}
