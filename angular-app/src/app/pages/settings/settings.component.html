<!-- En-tête de la page Paramètres -->
<header class="app-header">
  <div class="header-top">
    <div>
      <small>Configuration</small>
      <h1>Paramètres</h1>
    </div>
  </div>
  <small>Seuils et alertes</small>
</header>

<main class="app-main">

  <!-- Groupe : Seuils acoustiques -->
  <section class="group">
    <h2>Seuils acoustiques (Hz)</h2>

    <div class="setting">
      <div>
        <label>Seuil d'alerte essaimage</label>
        <small>Au-dessus, notification push</small>
      </div>
      <input type="number" [(ngModel)]="freqWarning" min="100" max="500" />
    </div>

    <div class="setting">
      <div>
        <label>Seuil critique maladie</label>
        <small>Déclenche une alerte rouge</small>
      </div>
      <input type="number" [(ngModel)]="freqCritical" min="100" max="500" />
    </div>
  </section>

  <!-- Groupe : Environnement -->
  <section class="group">
    <h2>Environnement</h2>

    <div class="setting">
      <div>
        <label>Température max (°C)</label>
        <small>Stress thermique au-delà</small>
      </div>
      <input type="number" [(ngModel)]="tempWarning" min="20" max="50" />
    </div>

    <div class="setting">
      <div>
        <label>Humidité max (%)</label>
        <small>Risque de moisissure</small>
      </div>
      <input type="number" [(ngModel)]="humidityMax" min="30" max="100" />
    </div>
  </section>

  <!-- Groupe : Notifications -->
  <section class="group">
    <h2>Notifications</h2>

    <div class="setting">
      <div>
        <label>Alertes critiques</label>
        <small>Push immédiat</small>
      </div>
      <span class="toggle" [class.on]="toggles.criticalAlerts" (click)="toggleCritical()"></span>
    </div>

    <div class="setting">
      <div>
        <label>Mode silencieux</label>
        <small>22h → 7h</small>
      </div>
      <span class="toggle" [class.on]="toggles.silentMode" (click)="toggleSilent()"></span>
    </div>
  </section>

  <!-- Groupe : Compte -->
  <section class="group">
    <h2>Compte</h2>

    <div class="setting">
      <div>
        <label>Profil</label>
        <small>test</small>
      </div>
      <span class="value">Modifier</span>
    </div>
  </section>

  <!-- Actions -->
  <button id="btn-save" class="btn btn-primary" (click)="save()">
    💾 Enregistrer
  </button>
  <button id="btn-reset" class="btn btn-secondary" (click)="reset()">
    Valeurs par défaut
  </button>

  @if (feedbackMsg()) {
    <p style="text-align: center; font-size: 0.875rem;"
       [style.color]="feedbackOk() ? 'var(--agri-green)' : 'var(--alert-red)'">
      {{ feedbackMsg() }}
    </p>
  }

</main>
