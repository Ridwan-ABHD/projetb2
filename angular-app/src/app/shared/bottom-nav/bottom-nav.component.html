<!-- Barre de navigation fixe en bas de l'écran / sidebar sur desktop -->
<nav class="bottom-nav">

  <!-- Bloc marque — visible uniquement sur desktop (≥1024px via CSS) -->
  <div class="sidebar-brand">
    <div class="sidebar-brand-icon">🐝</div>
    <div>
      <div class="sidebar-brand-name">BeeGuard AI</div>
      <div class="sidebar-brand-sub">Surveillance Apicole</div>
    </div>
  </div>

  <!-- Séparateur de section — desktop uniquement -->
  <div class="sidebar-section-label">Navigation</div>

  <!-- @for = boucle Angular 17+ -->
  @for (item of navItems; track item.path) {
    <a
      [routerLink]="item.path"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="nav-item"
      [attr.aria-label]="item.label"
    >
      <img class="nav-icon" [src]="item.icon" [alt]="item.label" />
      <span class="nav-label">{{ item.label }}</span>
    </a>
  }

  <!-- Footer sidebar — desktop uniquement -->
  <div class="sidebar-footer">
    <span class="sidebar-version">v2.0</span>
  </div>

</nav>
