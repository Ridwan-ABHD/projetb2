<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2D7D46" />
  <title>AgriSense — Carte des parcelles</title>
  <link rel="stylesheet" href="assets/css/variables.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/pages/parcelles.css" />
</head>
<body>
  <div class="app-shell">

    <!-- ====== HEADER ====== -->
    <header class="app-header">
      <h1 class="app-header__title">Mes parcelles</h1>
      <button class="app-header__icon-btn" aria-label="Filtrer">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
        </svg>
      </button>
    </header>

    <!-- ====== MAIN ====== -->
    <main class="app-main">

      <!-- Légende des statuts -->
      <section class="legend" aria-label="Légende">
        <span class="legend__item"><span class="legend__dot legend__dot--healthy"></span>Sain</span>
        <span class="legend__item"><span class="legend__dot legend__dot--warning"></span>Attention</span>
        <span class="legend__item"><span class="legend__dot legend__dot--critical"></span>Critique</span>
      </section>

      <!-- Grille des parcelles (CSS Grid 2x3) -->
      <section>
        <div class="section__heading">
          <h2 class="section__title">6 parcelles</h2>
          <span class="legend__count">3,4 ha total</span>
        </div>

        <div class="parcels-grid">

          <!-- JS hook: au clic, ouvrir le détail + zoomer la map -->
          <button class="parcel parcel--healthy" type="button" aria-label="Parcelle A — Saine">
            <span class="parcel__code">A</span>
            <span class="parcel__name">Blé Nord</span>
            <span class="parcel__meta">0,8 ha</span>
          </button>

          <button class="parcel parcel--critical" type="button" aria-label="Parcelle B — Critique">
            <span class="parcel__code">B</span>
            <span class="parcel__name">Maïs Est</span>
            <span class="parcel__meta">0,6 ha</span>
          </button>

          <button class="parcel parcel--healthy" type="button" aria-label="Parcelle C — Saine">
            <span class="parcel__code">C</span>
            <span class="parcel__name">Vigne Sud</span>
            <span class="parcel__meta">0,5 ha</span>
          </button>

          <button class="parcel parcel--warning" type="button" aria-label="Parcelle D — Attention">
            <span class="parcel__code">D</span>
            <span class="parcel__name">Tomates Serre 1</span>
            <span class="parcel__meta">0,3 ha</span>
          </button>

          <button class="parcel parcel--healthy" type="button" aria-label="Parcelle E — Saine">
            <span class="parcel__code">E</span>
            <span class="parcel__name">Verger Ouest</span>
            <span class="parcel__meta">0,7 ha</span>
          </button>

          <button class="parcel parcel--warning" type="button" aria-label="Parcelle F — Attention">
            <span class="parcel__code">F</span>
            <span class="parcel__name">Salades</span>
            <span class="parcel__meta">0,5 ha</span>
          </button>

        </div>
      </section>

      <!-- Détail parcelle sélectionnée (mock affiché) -->
      <section class="parcel-detail" aria-live="polite">
        <div class="parcel-detail__head">
          <div>
            <p class="parcel-detail__eyebrow">Parcelle sélectionnée</p>
            <h2 class="parcel-detail__title">B · Maïs Est</h2>
          </div>
          <span class="badge badge--critical"><span class="badge__dot"></span>Critique</span>
        </div>

        <ul class="parcel-detail__metrics">
          <li>
            <span class="parcel-detail__label">Humidité sol</span>
            <span class="parcel-detail__value">21%</span>
          </li>
          <li>
            <span class="parcel-detail__label">Température</span>
            <span class="parcel-detail__value">28°C</span>
          </li>
          <li>
            <span class="parcel-detail__label">Dernier scan</span>
            <span class="parcel-detail__value">Aujourd'hui 14:02</span>
          </li>
        </ul>

        <a href="diagnostic.html" class="btn btn--primary btn--full">
          Diagnostiquer cette parcelle
        </a>
      </section>

    </main>

    <!-- ====== BOTTOM NAV ====== -->
    <nav class="bottom-nav" aria-label="Navigation principale">
      <a href="index.html" class="bottom-nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Accueil
      </a>
      <a href="parcelles.html" class="bottom-nav__item is-active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
        Parcelles
      </a>
      <a href="diagnostic.html" class="bottom-nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3L12 3Z"/></svg>
        Diagnostic
      </a>
      <a href="historique.html" class="bottom-nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Historique
      </a>
      <a href="parametres.html" class="bottom-nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.39.16.74.42 1 .76V9a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Réglages
      </a>
    </nav>

  </div>

  <!-- JS hook: rendre les parcelles cliquables et mettre à jour la zone .parcel-detail -->
</body>
</html>
