<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2D7D46" />
  <title>AgriSense — Diagnostic IA</title>
  <link rel="stylesheet" href="assets/css/variables.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/pages/diagnostic.css" />
</head>
<body>
  <div class="app-shell">

    <!-- ====== HEADER ====== -->
    <header class="app-header">
      <a href="index.html" class="app-header__icon-btn" aria-label="Retour">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
      </a>
      <h1 class="app-header__title">Diagnostic IA</h1>
      <span class="app-header__icon-btn" aria-hidden="true"></span>
    </header>

    <!-- ====== MAIN ====== -->
    <main class="app-main">

      <!-- Hero IA -->
      <section class="diag-hero">
        <div class="diag-hero__avatar">
          <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3L12 3Z"/>
          </svg>
        </div>
        <h2 class="diag-hero__title">Comment puis-je vous aider&nbsp;?</h2>
        <p class="diag-hero__subtitle">
          Décrivez un symptôme observé ou une question. L'IA analyse les données de vos capteurs et propose un diagnostic.
        </p>
      </section>

      <!-- Suggestions rapides (chips) -->
      <section>
        <h3 class="diag-suggestions__title">Suggestions</h3>
        <div class="diag-suggestions">
          <!-- JS hook: au clic, pré-remplir le textarea avec le label -->
          <button class="chip" type="button">Feuilles jaunissantes</button>
          <button class="chip" type="button">Sol trop sec</button>
          <button class="chip" type="button">Pourquoi le rendement baisse&nbsp;?</button>
          <button class="chip" type="button">Tâches sur les fruits</button>
        </div>
      </section>

      <!-- Formulaire de question -->
      <form class="diag-form" autocomplete="off">
        <label for="diag-question" class="field__label">Votre question</label>
        <textarea
          id="diag-question"
          class="textarea"
          placeholder="Ex : les feuilles de la parcelle B sont brunes sur les bords, que faire ?"
          rows="4"
        ></textarea>

        <div class="diag-form__row">
          <label for="diag-parcelle" class="field__label">Parcelle concernée</label>
          <select id="diag-parcelle" class="input">
            <option>Toutes les parcelles</option>
            <option>A · Blé Nord</option>
            <option selected>B · Maïs Est</option>
            <option>C · Vigne Sud</option>
            <option>D · Tomates Serre 1</option>
          </select>
        </div>

        <!-- JS hook: au submit, envoyer { question, parcelle } à /api/diagnose et streamer la réponse Grok -->
        <button type="submit" class="btn btn--primary btn--full">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
          Lancer le diagnostic
        </button>
      </form>

      <!-- Zone de réponse (placeholder visible dès qu'une réponse arrive) -->
      <section class="diag-response" hidden>
        <p class="diag-response__label">Diagnostic IA</p>
        <p class="diag-response__text">
          <!-- JS hook: injecter ici la réponse retournée par l'API Grok -->
        </p>
      </section>

    </main>

    <!-- ====== BOTTOM NAV ====== -->
    <nav class="bottom-nav" aria-label="Navigation principale">
      <a href="index.html" class="bottom-nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Accueil
      </a>
      <a href="parcelles.html" class="bottom-nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
        Parcelles
      </a>
      <a href="diagnostic.html" class="bottom-nav__item is-active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3L12 3Z"/></svg>
        Diagnostic
      </a>
      <a href="historique.html" class="bottom-nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Historique
      </a>
      <a href="parametres.html" class="bottom-nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.39.16.74.42 1 .76V9a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Réglages
      </a>
    </nav>

  </div>
</body>
</html>
