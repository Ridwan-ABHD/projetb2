<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Surveillance Apicole — Carte</title>
  <link rel="stylesheet" href="base.css" />
  <link rel="stylesheet" href="ui.css" />
  <link rel="stylesheet" href="pages.css" />
</head>
<body>
  <div class="app">

    <header class="app-header">
      <div class="header-top">
        <div>
          <small>Vue d'ensemble</small>
          <h1>Mes Ruches</h1>
        </div>
        <button class="icon-btn" aria-label="Filtrer"></button>
      </div>
      <small id="hive-summary">6 ruches · 1 alerte critique</small>

    <main class="app-main">

        <span><span class="dot dot-red"></span>Maladie</span>
      </div>

      <section id="hive-grid" class="hive-grid"></section>

    </main>

    <nav class="bottom-nav">
      <a href="index"    class="nav-item">Accueil</a>
      <a href="map"      class="nav-item active">Ruches</a>
      <a href="diag"     class="nav-item">Diagnostic</a>
      <a href="history"  class="nav-item">Historique</a>
      <a href="settings" class="nav-item">Réglages</a>
      <a href="chat"     class="nav-item">Assistant</a>
    </nav>

  </div>
  <script src="api.js"></script>
  <script src="map.js"></script>

</html>
